services:
  postgres:
    image: postgres:15-alpine
    container_name: linkedin-hunter-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: linkedin_hunter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  scraper:
    build:
      context: ./scraper-service
      dockerfile: Dockerfile
    container_name: linkedin-hunter-scraper
    ports:
      - "8000:8000"
    volumes:
      - ./scraper-service/cookies.json:/app/cookies.json:ro
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: linkedin-hunter-server
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=linkedin_hunter
      - DB_PORT=5432
      - SCRAPER_URL=http://scraper:8000
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - SCHEDULE_KEYWORDS=${SCHEDULE_KEYWORDS:-software engineer,devops}
      - SCHEDULE_LOCATION=${SCHEDULE_LOCATION:-India}
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy
      scraper:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data: